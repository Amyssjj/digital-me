name: Feature request
description: Suggest an idea or improvement
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: What problem are you trying to solve?
      description: Describe the use case or pain point. Focus on the "why" before the "what".
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What would you like to see? Sketch the CLI command, config, or behavior if you can.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you thought about, and why they fall short.
  - type: dropdown
    id: area
    attributes:
      label: Area
      description: Which part of the stack does this touch?
      options:
        - CLI / installer
        - brain-orchestrator (tasks/goals/learnings/traces)
        - runtime adapter (claude-code / codex / hermes / openclaw)
        - transport (MCP proxy)
        - dashboard
        - dream-cycle
        - docs
        - other / not sure
    validations:
      required: true
