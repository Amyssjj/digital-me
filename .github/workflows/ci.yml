name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  sanitize:
    name: Sanitize gate (forbidden-pattern scan)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Run sanitize-check
        run: bash scripts/sanitize-check.sh

  build:
    name: Build, typecheck, lint, knip, test
    runs-on: ubuntu-latest
    needs: sanitize
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      # Build first so workspace deps emit dist/ — typecheck and test
      # both resolve `@digital-me/<pkg>` via the built output.
      - run: pnpm build
      - run: pnpm typecheck
      - run: pnpm lint
      # Dead-code guard. Fails only on high-signal categories (unused files,
      # deps, unlisted/unresolved imports); unused exports/types report as
      # warnings (see knip.json rules + the documented ignore-list).
      - run: pnpm knip
      - run: pnpm test

  dream-cycle-python:
    name: dream-cycle (pytest + sdist + wheel)
    runs-on: ubuntu-latest
    needs: sanitize
    defaults:
      run:
        working-directory: packages/services/dream-cycle
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: python -m pip install --upgrade pip build
      - run: pip install -e ".[dev]"
      - name: pytest
        run: pytest -q
      - name: Build sdist + wheel
        run: python -m build
      - name: Install built wheel and smoke-test console script
        run: |
          python -m venv /tmp/wheel-venv
          /tmp/wheel-venv/bin/pip install dist/digital_me_dream_cycle-*-py3-none-any.whl
          /tmp/wheel-venv/bin/digital-me-dream-cycle --help > /dev/null
          /tmp/wheel-venv/bin/python -c "import dream_cycle.run"
      - name: Upload distribution artifacts
        uses: actions/upload-artifact@v7
        with:
          name: dream-cycle-dist
          path: packages/services/dream-cycle/dist/*
          if-no-files-found: error
          retention-days: 7
